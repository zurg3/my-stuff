<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Windows update info</title>
    <style>
      #update_id {
        width: 120px;
      }
    </style>
  </head>
  <body>
    <h1>Windows update info</h1>
    <form>
      <p>KB<input type="number" id="update_id"> <input type="button" value="Submit" onclick="show_update_info()"></p>
    </form>
    <script>
      function show_update_info() {
        const update_id = document.getElementById('update_id').value;

        if (update_id) {
          window.open(`https://support.microsoft.com/help/${update_id}`, '_blank');
        }
      }
    </script>
  </body>
</html>
