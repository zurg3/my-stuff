<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <link href="markdown_editor/common.css" rel="stylesheet">
    <link href="markdown_editor/main.css" rel="stylesheet">
    <title>Markdown Editor</title>
  </head>
  <body>
    <!-- HTML -->
    <header>
      <h1 align="center">Markdown Editor</h1>
    </header>
    <div id="main">
      <div class="containers">
        <div class="container">
          <h3>Input <button type="button" onclick="clear_input()">Clear</button></h3>
          <textarea id="input" placeholder="Text..." oninput="compile_markdown()"></textarea>
        </div>
        <div class="container">
          <h3>Output</h3>
          <div id="output"></div>
        </div>
      </div>
    </div>
    <footer>
      <p align="center">Based on <a href="https://marked.js.org">Marked.js</a></p>
    </footer>

    <!-- Main JS -->
    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.min.js"></script>

    <!-- JS -->
    <script src="markdown_editor/main.js"></script>
  </body>
</html>
