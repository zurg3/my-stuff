<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Case converter</title>
    <link href="case/main.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/clipboard@2/dist/clipboard.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/zurg3/my-stuff@master/js/lib.min.js"></script>
  </head>
  <body>
    <h2>Case converter</h2>
    <div id="converter" hidden>
      <textarea id="input" cols="50" rows="10" placeholder="Input" oninput="convert_case()"></textarea>
      <p>
        <label for="case_option">Convert to</label><br>
        <input type="radio" name="case_option" value="upper" onchange="convert_case()" checked>UPPER CASE<br>
        <input type="radio" name="case_option" value="lower" onchange="convert_case()">lower case<br>
        <input type="radio" name="case_option" value="title" onchange="convert_case()">Title Case<br>
        <input type="radio" name="case_option" value="swap" onchange="convert_case()">sWAP cASE
      </p>
      <p>
        <input type="button" value="Copy" id="copy_button" data-clipboard-target="#output" data-clipboard-action="copy">
        <input type="button" value="Clear" id="clear_button" onclick="clear_all()"></p>
      <textarea id="output" cols="50" rows="10" placeholder="Output" readonly></textarea>
    </div>
    <script src="case/main.js"></script>
  </body>
</html>
